name: Refresh Miniature Manifest

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:  # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch manifest from source repo
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, urllib.error

          TOKEN = ""  # leave blank for public repo (60 req/hr limit is fine for one tree call)
          SOURCE = "theripper93/canvas3dtokencompendium"
          PREFIX = "miniatures/_Colorized"

          url = f"https://api.github.com/repos/{SOURCE}/git/trees/master?recursive=1"
          req = urllib.request.Request(url, headers={
              "Accept": "application/vnd.github.v3+json",
              "User-Agent": "miniature-browser-action",
              **({"Authorization": f"token {TOKEN}"} if TOKEN else {})
          })

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          glbs = [f for f in data["tree"]
                  if f["path"].startswith(PREFIX) and f["path"].endswith(".glb")]

          manifest = []
          for f in glbs:
              rel = f["path"][len(PREFIX)+1:]  # strip "miniatures/_Colorized/"
              parts = rel.split("/")
              folder = parts[0] if len(parts) >= 2 else "_root"
              filename = parts[-1]
              name = filename[:-4]  # strip .glb
              subfolder = "/".join(parts[1:-1]) if len(parts) > 2 else ""
              manifest.append({"name": name, "folder": folder, "subfolder": subfolder, "path": rel})

          manifest.sort(key=lambda m: (m["folder"], m["name"]))

          with open("manifest.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, ensure_ascii=False, indent=2)

          print(f"✅ manifest.json written with {len(manifest)} entries")
          if data.get("truncated"):
              print("⚠️  WARNING: tree was truncated — may be missing files!")
          PYEOF

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No changes to manifest.json"
          else
            git commit -m "chore: refresh manifest.json ($(date -u +%Y-%m-%d))"
            git push
            echo "✅ manifest.json updated and pushed"
          fi
